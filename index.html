<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>胡锦霖 | 音频作品集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg: #0a0a0a;
      --text: #f5f5f5;
      --accent: #333;
      --muted: #666;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    
    section {
      min-height: 100vh;
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      max-width: 800px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }
    
    h2 {
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 40px;
      color: var(--muted);
    }
    
    .hero h1 {
      font-size: 4rem;
    }
    
    .tagline {
      color: var(--muted);
      font-size: 1.2rem;
      margin-bottom: 40px;
    }
    
    .contact {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .contact a {
      color: var(--text);
      text-decoration: none;
      padding: 10px 20px;
      border: 1px solid var(--accent);
      transition: all 0.3s;
    }
    
    .contact a:hover {
      background: var(--accent);
    }
    
    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    
    .skill {
      padding: 15px 30px;
      background: var(--accent);
      font-size: 0.9rem;
    }
    
    .project {
      width: 100%;
      padding: 40px;
      border: 1px solid var(--accent);
      margin-bottom: 30px;
    }
    
    .project h3 {
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 15px;
    }
    
    .project .meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    
    .audio-player {
      width: 100%;
      margin-top: 20px;
    }
    
    audio {
      width: 100%;
      height: 40px;
    }
    
    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      width: 100%;
    }
    
    .work-item {
      padding: 30px;
      border: 1px solid var(--accent);
    }
    
    .work-item h3 {
      font-weight: 400;
      margin-bottom: 10px;
    }
    
    .work-item p {
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: rgba(10,10,10,0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }
    
    nav .logo {
      font-weight: 600;
    }
    
    nav a {
      color: var(--text);
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
    }
    
    .thanks {
      text-align: center;
    }
    
    .thanks h1 {
      font-size: 3rem;
    }
    
    .thanks p {
      color: var(--muted);
      margin-top: 20px;
    }
    
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .hero h1 { font-size: 2.5rem; }
      section { padding: 60px 15px; }
    }
  </style>
</head>
<body>
